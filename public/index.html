<style>
:root {
  --bg:#080810; --surface:#10101e; --border:#ffffff0f;
  --accent:#e8ff00; --accent2:#ff3c3c; --accent3:#00d4ff;
  --text:#f0f0f8; --muted:#6666aa; --live:#ff2d55;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:rgba(8,8,16,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.date-badge{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}

/* AUTH BUTTON */
.auth-btn{background:rgba(232,255,0,.12);border:1px solid rgba(232,255,0,.3);color:var(--accent);padding:6px 12px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer}

/* PAGES */
.page{display:none}
.page.active{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,16,.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px;cursor:pointer;color:var(--muted);gap:3px;transition:color .2s}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:20px}
.nav-label{font-size:9px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.content-wrap{padding-bottom:calc(70px + env(safe-area-inset-bottom,0))}

/* AD SLOT */
.ad-slot{width:100%;background:rgba(255,255,255,.02);border-top:1px solid var(--border);border-bottom:1px solid var(--border);text-align:center;overflow:hidden}
.ad-slot::before{content:'Publicidad';display:block;font-size:9px;color:var(--muted);letter-spacing:1px;padding:4px 0 2px;font-family:'Barlow Condensed',sans-serif}

/* EVENT HERO */
.event-hero{position:relative;background:linear-gradient(160deg,#12122a 0%,#08080f 60%);padding:24px 16px 20px;border-bottom:1px solid var(--border);overflow:hidden}
.event-hero::before{content:'UFC';position:absolute;right:-20px;top:-20px;font-family:'Bebas Neue',sans-serif;font-size:140px;color:rgba(255,255,255,.02);pointer-events:none;line-height:1}
.event-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(232,255,0,.12);border:1px solid rgba(232,255,0,.3);border-radius:4px;padding:3px 10px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:12px}
.event-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;line-height:1.1;margin-bottom:4px}
.event-title span{color:var(--accent3)}
.event-meta{font-size:12px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap;margin-top:8px}

/* COUNTDOWN */
.countdown{display:flex;gap:8px;margin-top:16px}
.cd-unit{flex:1;text-align:center;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:10px 4px}
.cd-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--accent);line-height:1}
.cd-label{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-top:2px}

/* SECTION */
.section-header{display:flex;align-items:center;justify-content:space-between;padding:20px 16px 10px}
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}

/* EVENTS LIST */
.events-list{padding:0 12px 20px;display:flex;flex-direction:column;gap:10px}
.event-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;position:relative;overflow:hidden}
.event-card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.event-card.numbered::after{background:var(--accent)}
.event-card.fight-night::after{background:var(--accent3)}
.event-card.special::after{background:var(--accent2)}
.event-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.event-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;line-height:1.2;flex:1}
.event-type-pill{font-size:9px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;font-weight:700;padding:3px 7px;border-radius:4px;text-transform:uppercase;flex-shrink:0;margin-left:8px}
.pill-numbered{background:rgba(232,255,0,.15);color:var(--accent);border:1px solid rgba(232,255,0,.3)}
.pill-fn{background:rgba(0,212,255,.12);color:var(--accent3);border:1px solid rgba(0,212,255,.25)}
.pill-special{background:rgba(255,60,60,.12);color:var(--accent2);border:1px solid rgba(255,60,60,.25)}
.event-card-meta{display:flex;gap:12px;font-size:12px;color:var(--muted);flex-wrap:wrap}
.event-main{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;color:rgba(255,255,255,.7)}

/* FIGHT ROWS */
.fight-card{padding:0 12px;display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.fight-row{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s;position:relative}
.fight-row:active{transform:scale(.98)}
.fight-row.main-event{border-color:rgba(232,255,0,.25)}
.fight-row.co-main{border-color:rgba(0,212,255,.15)}
.fight-label{position:absolute;top:8px;left:8px;font-size:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:2px 6px;border-radius:3px;z-index:2}
.label-main{background:var(--accent);color:#000}
.label-co{background:var(--accent3);color:#000}
.label-prelim{background:rgba(255,255,255,.1);color:var(--muted)}
.fight-inner{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:16px 12px 12px;gap:8px;margin-top:4px}
.fighter{display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center}
.fighter-flag{font-size:22px;line-height:1}
.fighter-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:.5px;line-height:1.1}
.fighter-record{font-size:10px;color:var(--muted)}
.fighter-rank{font-size:9px;background:rgba(255,255,255,.07);padding:1px 5px;border-radius:3px;color:var(--muted)}
.fight-center{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0}
.vs-text{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--accent2);letter-spacing:2px}
.weight-class{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.rounds-badge{font-size:9px;background:rgba(255,60,60,.12);color:var(--accent2);padding:1px 6px;border-radius:10px;border:1px solid rgba(255,60,60,.2)}
.pred-bar-wrap{padding:0 12px 12px;display:flex;align-items:center;gap:6px}
.pred-bar{flex:1;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;display:flex}
.pred-fill-a{height:100%;background:linear-gradient(90deg,var(--accent),#b8cc00);border-radius:2px}
.pred-fill-b{height:100%;background:linear-gradient(90deg,var(--accent2),#cc2020);border-radius:2px;margin-left:auto}
.pred-pct-a{font-size:9px;color:var(--accent);flex-shrink:0;width:24px}
.pred-pct-b{font-size:9px;color:var(--accent2);flex-shrink:0;width:24px;text-align:right}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;flex-direction:column;gap:12px;color:var(--muted)}
.spinner{width:32px;height:32px;border:3px solid rgba(232,255,0,.2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{background:rgba(255,60,60,.1);border:1px solid rgba(255,60,60,.25);border-radius:10px;padding:14px 16px;margin:12px;font-size:13px;color:var(--accent2)}

/* INSTALL BANNER */

.close-banner{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:0;flex-shrink:0}

/* RANKINGS */
.wc-scroll{display:flex;gap:8px;padding:12px 12px 8px;overflow-x:auto;scrollbar-width:none}
.wc-scroll::-webkit-scrollbar{display:none}
.wc-pill{flex-shrink:0;padding:6px 14px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:var(--surface);transition:all .2s}
.wc-pill.active{background:rgba(232,255,0,.1);border-color:rgba(232,255,0,.4);color:var(--accent)}
.ranking-list{padding:0 12px 20px;display:flex;flex-direction:column;gap:6px}
.rank-row{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;gap:12px}
.rank-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--muted);width:28px;text-align:center;flex-shrink:0}
.rank-num.champ{color:var(--accent);font-size:14px;letter-spacing:1px}
.rank-info{flex:1}
.rank-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700}
.rank-record{font-size:11px;color:var(--muted)}

.rank-trend{font-size:11px;flex-shrink:0;width:20px;text-align:center}

.input-group input{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:15px;font-family:'Barlow',sans-serif;outline:none}

</style>

<script>
// =====================================================
// CONFIG
// =====================================================
if (typeof supabase === 'undefined') {
	const supabase = window.supabase?.createClient(SUPABASE_URL, SUPABASE_ANON);
}
let currentUser = null;
let nextEventData = null;
let cdInterval = null;

// =====================================================
// API HELPER
// =====================================================
async function api(endpoint, method='GET', body=null) {
  const token = localStorage.getItem('mma_token');
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', ...(token ? { 'Authorization': `Bearer ${token}` } : {}) },
    ...(body ? { body: JSON.stringify(body) } : {})
  };
  const res = await fetch(`${API_URL}${endpoint}`, opts);
  if (!res.ok) throw new Error(`API error ${res.status}`);
  return res.json();
}

// =====================================================
// TABS
// =====================================================
const TAB_IDX = {events:0, card:1, rankings:2, news:3};
function switchTab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

// =====================================================
// COUNTDOWN
// =====================================================
function startCountdown(isoDate) {
  if (cdInterval) clearInterval(cdInterval);
  function tick() {
    const diff = new Date(isoDate) - new Date();
    if (diff <= 0) {
      document.getElementById('cd-h').textContent = 'LIVE';
      document.getElementById('cd-m').textContent = '--';
      document.getElementById('cd-s').textContent = '--';
      clearInterval(cdInterval); return;
    }
    document.getElementById('cd-h').textContent = String(Math.floor(diff/3600000)).padStart(2,'0');
    document.getElementById('cd-m').textContent = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
    document.getElementById('cd-s').textContent = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
  }
  tick();
  cdInterval = setInterval(tick, 1000);
}

function renderEventsList(events) {
  const upcoming = events.filter(e => e.status === 'Upcoming' || new Date(e.event_date) >= new Date());
  if (!upcoming.length) {
    document.getElementById('events-list').innerHTML = '<div class="error-msg">No hay eventos próximos disponibles.</div>';
    return;
  }

  const typeClass = t => t==='Numbered'?'numbered':t==='Special'?'special':'fight-night';
  const pillClass = t => t==='Numbered'?'pill-numbered':t==='Special'?'pill-special':'pill-fn';
  const pillText  = t => t==='Numbered'?'Numerado':t==='Special'?'Especial':'Fight Night';

  document.getElementById('events-list').innerHTML = upcoming.map((e,i) => `
    <div class="event-card ${typeClass(e.event_type)}" onclick="loadEventCard('${e.ufc_slug}')">
      <div class="event-card-header">
        <div class="event-name">${e.name}<br>
          <span style="color:rgba(255,255,255,.5);font-size:13px">${e.city||''}</span>
        </div>
        <div class="event-type-pill ${pillClass(e.event_type)}">${pillText(e.event_type)}</div>
      </div>
      <div class="event-card-meta">
        <span>📅 ${formatDate(e.event_date)}</span>
        <span>📍 ${e.venue||e.city||''}</span>
        ${e.broadcast ? `<span>📺 ${e.broadcast}</span>` : ''}
      </div>
    </div>
  `).join('');
}

// =====================================================
// CARGAR CARTELERA DE UN EVENTO
// =====================================================
async function loadEventCard(slug) {
  switchTab('card');
  document.getElementById('card-content').innerHTML = '<div class="loading"><div class="spinner"></div>Cargando cartelera...</div>';
  document.getElementById('card-hero').innerHTML = '';

  try {
    const ev = await api(`/events/${slug}`);

    document.getElementById('card-hero').innerHTML = `
      <div class="event-hero" style="padding-bottom:16px">
        <div class="event-badge">UFC · ${formatDate(ev.event_date)}</div>
        <div class="event-title" style="font-size:22px">${ev.name.toUpperCase()}</div>
        <div class="event-meta">
          <span>🏟️ ${ev.venue||''}</span>
          <span>📺 ${ev.broadcast||'Paramount+'}</span>
        </div>
      </div>`;

    const fights = ev.fights || [];
    const mainCard = fights.filter(f => f.card_segment === 'Main Card' || f.is_main_event || f.is_title_fight);
    const prelims  = fights.filter(f => f.card_segment !== 'Main Card' && !f.is_main_event);

    let html = '';
    if (mainCard.length) {
      html += `<div class="section-header"><div class="section-title">Main Card</div></div>`;
      html += `<div class="fight-card">${mainCard.map((f,i) => renderFightRow(f, i)).join('')}</div>`;
    }
    if (prelims.length) {
      html += `<div class="section-header"><div class="section-title">Preliminares</div></div>`;
      html += `<div class="fight-card">${prelims.map(f => renderFightRow(f, 99)).join('')}</div>`;
    }
    if (!fights.length) {
      html = '<div class="error-msg" style="margin:12px">La cartelera completa aún no está disponible.</div>';
    }

    document.getElementById('card-content').innerHTML = html;
  } catch(e) {
    document.getElementById('card-content').innerHTML =
      `<div class="error-msg">Error al cargar la cartelera. Inténtalo de nuevo.</div>`;
  }
}

function renderFightRow(f, pos) {
  const fa = f.fighter_a || {};
  const fb = f.fighter_b || {};
  const flagA = fa.nationality?.flag_emoji || '🏳️';
  const flagB = fb.nationality?.flag_emoji || '🏳️';
  const nameA = `${fa.first_name||''} ${fa.last_name||''}`.trim() || 'TBA';
  const nameB = `${fb.first_name||''} ${fb.last_name||''}`.trim() || 'TBA';
  const recA  = fa.wins !== undefined ? `${fa.wins}-${fa.losses}` : '';
  const recB  = fb.wins !== undefined ? `${fb.wins}-${fb.losses}` : '';
  const wc    = f.weight_class?.name_es || f.weight_class?.name || '';
  const rounds = f.scheduled_rounds || 3;
  const isMain = f.is_main_event || pos === 0;
  const isCo   = f.is_title_fight && !isMain;

  const labelClass = isMain ? 'label-main' : isCo ? 'label-co' : 'label-prelim';
  const labelText  = isMain ? 'Main Event' : f.is_title_fight ? 'Título' : f.card_segment || 'Prelim';
  const rowClass   = isMain ? 'main-event' : isCo ? 'co-main' : '';

  return `
    <div class="fight-row ${rowClass}">
      <div class="fight-label ${labelClass}">${labelText}</div>
      <div class="fight-inner">
        <div class="fighter">
          <div class="fighter-flag">${flagA}</div>
          <div class="fighter-name">${nameA.replace(' ','<br>')}</div>
          <div class="fighter-record">${recA}</div>
        </div>
        <div class="fight-center">
          <div class="vs-text">VS</div>
          <div class="weight-class">${wc}</div>
          <div class="rounds-badge">${rounds} × 5 min</div>
        </div>
        <div class="fighter">
          <div class="fighter-flag">${flagB}</div>
          <div class="fighter-name">${nameB.replace(' ','<br>')}</div>
          <div class="fighter-record">${recB}</div>
        </div>
      </div>
    </div>`;
}

// AUTH
// =====================================================
let isLoginMode = true;

function openAuthModal() {
  if (currentUser) { showUserMenu(); return; }
  document.getElementById('auth-modal').classList.add('show');
}
function closeAuthModal() {
  document.getElementById('auth-modal').classList.remove('show');
  document.getElementById('modal-error').classList.remove('show');
}
function toggleAuthMode() {
  isLoginMode = !isLoginMode;
  document.getElementById('modal-title').textContent = isLoginMode ? 'INICIAR SESIÓN' : 'CREAR CUENTA';
  document.getElementById('modal-submit-btn').textContent = isLoginMode ? 'ENTRAR' : 'REGISTRARSE';
  document.getElementById('toggle-text').textContent = isLoginMode ? 'Regístrate' : 'Iniciar sesión';
  document.getElementById('username-group').style.display = isLoginMode ? 'none' : 'block';
  document.querySelector('.modal-toggle').innerHTML = isLoginMode
    ? '¿No tienes cuenta? <span id="toggle-text" onclick="toggleAuthMode()">Regístrate</span>'
    : '¿Ya tienes cuenta? <span id="toggle-text" onclick="toggleAuthMode()">Iniciar sesión</span>';
}

async function submitAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-pass').value;
  const errEl = document.getElementById('modal-error');
  errEl.classList.remove('show');

  if (!email || !pass) { errEl.textContent='Rellena todos los campos'; errEl.classList.add('show'); return; }

  try {
    let data;
    if (isLoginMode) {
      const res = await api('/auth/login', 'POST', { email, password: pass });
      localStorage.setItem('mma_token', res.access_token);
      currentUser = res.user;
    } else {
      const username = document.getElementById('auth-username').value.trim();
      await api('/auth/register', 'POST', { email, password: pass, username });
      errEl.textContent = '✅ Revisa tu email para confirmar la cuenta.';
      errEl.style.color = '#00dc64';
      errEl.classList.add('show');
      return;
    }
    closeAuthModal();
    updateAuthButton();
  } catch(e) {
    errEl.textContent = 'Credenciales incorrectas o error del servidor.';
    errEl.classList.add('show');
  }
}

function updateAuthButton() {
  const btn = document.getElementById('auth-btn');
  if (currentUser) {
    btn.textContent = currentUser.email?.split('@')[0] || 'Mi perfil';
  } else {
    btn.textContent = 'Entrar';
  }
}

function showUserMenu() {
  if (confirm(`Sesión iniciada como ${currentUser?.email}\n\n¿Quieres cerrar sesión?`)) {
    localStorage.removeItem('mma_token');
    currentUser = null;
    updateAuthButton();
  }
}

  return d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();
}
