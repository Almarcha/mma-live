<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>MMA Live</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    #events {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .event-card {
      background: #1e293b;
      border-radius: 12px;
      padding: 16px;
    }

    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }

    .pill-numbered { background: #dc2626; }
    .pill-fn { background: #2563eb; }
    .pill-special { background: #16a34a; }

    a {
      display: inline-block;
      margin-top: 10px;
      color: #38bdf8;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <h1>🥊 MMA Live</h1>

  <div id="events">
    <p>Cargando eventos...</p>
  </div>

  <script>
    async function loadEvents() {
      try {
        const res = await fetch('https://almarcha.github.io/mma-live/events.json?v=' + Date.now());
        const json = await res.json();

        console.log("JSON:", json);

        let events = Array.isArray(json.events) ? json.events : [];

        // ordenar por fecha
        events.sort((a, b) => {
          if (!a.date_iso) return 1;
          if (!b.date_iso) return -1;
          return new Date(a.date_iso) - new Date(b.date_iso);
        });

        renderEvents(events);

      } catch (err) {
        console.error(err);
        document.getElementById('events').innerHTML =
          `<p>Error cargando eventos</p>`;
      }
    }

    function renderEvents(events) {
      const container = document.getElementById('events');

      if (!events.length) {
        container.innerHTML = `<p>No hay eventos disponibles</p>`;
        return;
      }

      container.innerHTML = events.map(event => {

        return `
          <div class="event-card">

            <div class="pill ${event.pill}">
              ${event.pillText}
            </div>

            <h3>${event.name}</h3>

            <p><strong>📅</strong> ${event.date || 'Por confirmar'}</p>
            <p><strong>📍</strong> ${event.location}</p>

            <p><strong>🥊</strong> ${event.main || 'Por confirmar'}</p>

            <a href="${event.url}" target="_blank">
              Ver evento →
            </a>

          </div>
        `;
      }).join('');
    }

    loadEvents();
  </script>

</body>
</html>
