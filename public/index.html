<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UFC Events — Live Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #D20A0A;
    --red-glow: #FF1A1A;
    --gold: #C9A84C;
    --gold-light: #F0C96B;
    --bg: #080808;
    --bg2: #101010;
    --bg3: #181818;
    --border: rgba(255,255,255,0.07);
    --text: #F0F0F0;
    --muted: #666;
    --card-hover: #141414;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NOISE TEXTURE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    padding: 0 2rem;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(8,8,8,0.95);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-badge {
    background: var(--red);
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    padding: 4px 10px;
    clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 100%, 0 100%);
  }

  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 4px;
    color: var(--text);
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--red);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    padding: 5rem 2rem 4rem;
    overflow: hidden;
  }

  .hero::before {
    content: 'UFC';
    position: absolute;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(120px, 25vw, 280px);
    color: rgba(255,255,255,0.015);
    right: -2%;
    top: 50%;
    transform: translateY(-50%);
    letter-spacing: -10px;
    pointer-events: none;
    user-select: none;
  }

  .hero-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.1s;
  }

  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 7vw, 5.5rem);
    letter-spacing: 4px;
    line-height: 0.95;
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.2s;
  }

  .hero-title span {
    color: var(--red);
  }

  .hero-sub {
    color: var(--muted);
    font-size: 0.95rem;
    font-weight: 300;
    max-width: 420px;
    line-height: 1.7;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.3s;
  }

  .hero-stats {
    display: flex;
    gap: 3rem;
    margin-top: 3rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.4s;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 2px;
    color: var(--gold);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.72rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── DIVIDER ── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    padding: 0 2rem;
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.5s;
  }

  .section-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 5px;
    color: var(--muted);
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--border), transparent);
  }

  .section-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--red);
    letter-spacing: 2px;
  }

  /* ── EVENTS GRID ── */
  .events-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1px;
    background: var(--border);
    margin: 0 0 4px;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  /* ── EVENT CARD ── */
  .event-card {
    background: var(--bg);
    padding: 2rem;
    cursor: pointer;
    transition: background 0.2s ease;
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards;
  }

  .event-card:hover {
    background: var(--card-hover);
  }

  .event-card::after {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--red);
    transform: scaleY(0);
    transition: transform 0.25s ease;
    transform-origin: bottom;
  }

  .event-card:hover::after {
    transform: scaleY(1);
  }

  .event-card.next-event {
    background: var(--bg2);
    grid-column: 1 / -1;
  }

  .event-card.next-event::after {
    background: var(--gold);
    width: 3px;
    transform: scaleY(1);
  }

  /* NEXT EVENT LABEL */
  .next-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid rgba(201,168,76,0.3);
    padding: 3px 8px;
    margin-bottom: 1.5rem;
    background: rgba(201,168,76,0.05);
  }

  .next-label-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--gold);
    animation: pulse 1.5s ease-in-out infinite;
  }

  /* CARD INNER */
  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .event-type {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--red);
  }

  .event-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 2px;
    color: var(--muted);
    opacity: 0.4;
  }

  .event-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    letter-spacing: 2px;
    line-height: 1.05;
    margin-bottom: 0.4rem;
    color: var(--text);
  }

  .next-event .event-name {
    font-size: clamp(2rem, 4vw, 3rem);
  }

  .event-subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    font-weight: 300;
    margin-bottom: 2rem;
    line-height: 1.5;
  }

  /* FIGHTERS */
  .fighters {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .fighter {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
  }

  .fighter-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 2px;
    line-height: 1;
  }

  .fighter-role {
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .vs {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    color: var(--red);
    letter-spacing: 2px;
    padding: 0 0.25rem;
    opacity: 0.8;
  }

  .fighter:last-child {
    text-align: right;
  }

  /* CARD FOOTER */
  .card-footer {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  .meta {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .meta-date {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 2px;
    color: var(--text);
  }

  .meta-location {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  .countdown {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }

  .countdown-days {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 2px;
    color: var(--gold);
    line-height: 1;
  }

  .countdown-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .countdown.urgent .countdown-days {
    color: var(--red-glow);
    text-shadow: 0 0 20px rgba(255,26,26,0.4);
  }

  /* DETAIL PANEL */
  .detail-panel {
    display: none;
    grid-column: 1 / -1;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 2.5rem 2rem;
    animation: expandDown 0.3s ease;
  }

  .detail-panel.open {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 2rem;
  }

  @keyframes expandDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .detail-section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
  }

  .fight-list {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .fight-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.82rem;
  }

  .fight-row:last-child { border-bottom: none; }

  .fight-type {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 1px;
    color: var(--red);
  }

  .fight-names {
    font-weight: 500;
    color: var(--text);
  }

  .fight-weight {
    font-size: 0.7rem;
    color: var(--muted);
    font-weight: 300;
  }

  /* COMMING SOON */
  .card-placeholder {
    opacity: 0.35;
    pointer-events: none;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── FOOTER ── */
  footer {
    padding: 3rem 2rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .footer-left {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .footer-right {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 300;
  }

  .footer-right a {
    color: var(--gold);
    text-decoration: none;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .hero { padding: 3rem 1.25rem 2.5rem; }
    .section-header { padding: 0 1.25rem; }
    .events-grid { grid-template-columns: 1fr; }
    .hero-stats { gap: 1.5rem; }
    .detail-panel.open { grid-template-columns: 1fr; }
    footer { padding: 2rem 1.25rem; }
    header { padding: 0 1.25rem; }
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex;
    gap: 0.5rem;
    padding: 0 2rem 2rem;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards 0.55s;
  }

  .filter-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--red);
    color: var(--text);
    background: rgba(210,10,10,0.08);
  }

  /* ── TOOLTIP ── */
  .card-link {
    position: absolute;
    bottom: 1.5rem;
    right: 1.5rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.2s ease;
    text-decoration: none;
  }

  .event-card:hover .card-link {
    opacity: 1;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-badge">UFC</div>
    <div class="logo-text">FIGHT TRACKER</div>
  </div>
  <div class="live-badge">
    <div class="live-dot"></div>
    Live updates
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-eyebrow">// Upcoming Fight Schedule</div>
  <h1 class="hero-title">
    PRÓXIMOS<br><span>EVENTOS</span>
  </h1>
  <p class="hero-sub">
    Todos los eventos de la UFC. Fechas, carteleras y localizaciones actualizadas en tiempo real.
  </p>
  <div class="hero-stats">
    <div class="stat">
      <span class="stat-num" id="stat-events">—</span>
      <span class="stat-label">Eventos</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="stat-next">—</span>
      <span class="stat-label">Días al próximo</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="stat-countries">—</span>
      <span class="stat-label">Países</span>
    </div>
  </div>
</section>

<!-- FILTER BAR -->
<div class="filter-bar">
  <button class="filter-btn active" onclick="filterEvents('all', this)">Todos</button>
  <button class="filter-btn" onclick="filterEvents('PPV', this)">PPV</button>
  <button class="filter-btn" onclick="filterEvents('Fight Night', this)">Fight Night</button>
</div>

<!-- SECTION HEADER -->
<div class="section-header">
  <span class="section-label">Cartelera</span>
  <div class="section-line"></div>
  <span class="section-count" id="event-count">— eventos</span>
</div>

<!-- EVENTS GRID -->
<div class="events-grid" id="events-grid">
  <!-- Cards generadas por JS -->
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-left">UFC FIGHT TRACKER · <span id="footer-date"></span></div>
  <div class="footer-right">Datos extraídos de <a href="https://www.ufc.com/events" target="_blank">ufc.com</a></div>
</footer>

<script>
// ─── DATOS ───────────────────────────────────────────────────────────────────
// Se cargan desde events.json; si no está disponible, se usa fallback inline.
const FALLBACK_EVENTS = [
  {
    name: "Prochazka vs Ulberg",
    date: "2026-04-12",
    location: "Kaseya Center — Miami, FL, United States",
    url: "https://www.ufc.com/event/ufc-327",
    type: "PPV"
  },
  {
    name: "Burns vs Malott",
    date: "2026-04-18",
    location: "Meta APEX — Las Vegas, NV, United States",
    url: "https://www.ufc.com/event/ufc-fight-night-april-18-2026",
    type: "Fight Night"
  },
  {
    name: "Yan vs Nurmagomedov",
    date: "2026-04-25",
    location: "Por confirmar",
    url: "https://www.ufc.com/events",
    type: "Fight Night"
  },
  {
    name: "UFC 328",
    date: "2026-05-09",
    location: "Por confirmar",
    url: "https://www.ufc.com/events",
    type: "PPV"
  },
  {
    name: "Fight Night Mayo",
    date: "2026-05-16",
    location: "Meta APEX — Las Vegas, NV, United States",
    url: "https://www.ufc.com/events",
    type: "Fight Night"
  },
  {
    name: "UFC 329",
    date: "2026-06-06",
    location: "Por confirmar",
    url: "https://www.ufc.com/events",
    type: "PPV"
  }
];

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const TODAY = new Date();
TODAY.setHours(0, 0, 0, 0);

function daysUntil(dateStr) {
  const d = new Date(dateStr);
  d.setHours(0, 0, 0, 0);
  return Math.ceil((d - TODAY) / 86400000);
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' })
          .replace(/^\w/, c => c.toUpperCase());
}

function getEventType(ev) {
  if (ev.type) return ev.type;
  if (/\bUFC\s+\d{3}\b/i.test(ev.name)) return 'PPV';
  return 'Fight Night';
}

function parseMainEvent(name) {
  // Intentar extraer "Fighter1 vs Fighter2"
  const m = name.match(/^(.+?)\s+vs\.?\s+(.+)$/i);
  if (m) return { f1: m[1].trim(), f2: m[2].trim() };
  return null;
}

function getLocation(loc) {
  if (!loc || loc === '–') return 'Localización por confirmar';
  return loc.replace(' — ', '\n');
}

// ─── RENDER ─────────────────────────────────────────────────────────────────
let allEvents = [];
let activeFilter = 'all';

function renderEvents(events) {
  const grid = document.getElementById('events-grid');
  const count = document.getElementById('event-count');
  const filtered = activeFilter === 'all'
    ? events
    : events.filter(e => getEventType(e) === activeFilter);

  count.textContent = `${filtered.length} eventos`;
  grid.innerHTML = '';

  filtered.forEach((ev, i) => {
    const days = daysUntil(ev.date);
    const isNext = i === 0;
    const type = getEventType(ev);
    const fighters = parseMainEvent(ev.name);
    const locLines = getLocation(ev.location).split('\n');

    const card = document.createElement('div');
    card.className = 'event-card' + (isNext ? ' next-event' : '');
    card.style.animationDelay = `${0.05 * i + 0.5}s`;
    card.dataset.type = type;
    card.dataset.id = i;

    card.innerHTML = `
      ${isNext ? `<div class="next-label"><span class="next-label-dot"></span>Próximo evento</div>` : ''}
      <div class="card-top">
        <span class="event-type">${type}</span>
        <span class="event-number">#${String(i + 1).padStart(2, '0')}</span>
      </div>
      <div class="event-name">${ev.name}</div>
      ${fighters ? `
        <div class="fighters">
          <div class="fighter">
            <div class="fighter-name">${fighters.f1}</div>
            <div class="fighter-role">Titular</div>
          </div>
          <div class="vs">VS</div>
          <div class="fighter" style="text-align:right">
            <div class="fighter-name">${fighters.f2}</div>
            <div class="fighter-role">Retador</div>
          </div>
        </div>
      ` : ''}
      <div class="card-footer">
        <div class="meta">
          <div class="meta-date">${formatDate(ev.date)}</div>
          <div class="meta-location">${locLines[0]}${locLines[1] ? '<br>' + locLines[1] : ''}</div>
        </div>
        <div class="countdown ${days <= 7 ? 'urgent' : ''}">
          <div class="countdown-days">${days}</div>
          <div class="countdown-label">${days === 1 ? 'día' : 'días'}</div>
        </div>
      </div>
      <a class="card-link" href="${ev.url}" target="_blank" rel="noopener">Ver cartelera →</a>
    `;

    grid.appendChild(card);
  });
}

function filterEvents(type, btn) {
  activeFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderEvents(allEvents);
}

function updateStats(events) {
  document.getElementById('stat-events').textContent = events.length;
  const days = daysUntil(events[0].date);
  document.getElementById('stat-next').textContent = days;

  const countries = new Set(
    events.map(e => {
      const parts = (e.location || '').split(',');
      return parts[parts.length - 1].trim();
    }).filter(Boolean)
  );
  document.getElementById('stat-countries').textContent = countries.size || '—';
}

// ─── LOAD DATA ───────────────────────────────────────────────────────────────
async function loadEvents() {
  let events;
  try {
    const resp = await fetch('public/events.json');
    if (!resp.ok) throw new Error('not found');
    events = await resp.json();
    // Filtrar pasados por si acaso
    const todayStr = TODAY.toISOString().slice(0, 10);
    events = events.filter(e => e.date >= todayStr);
    events.sort((a, b) => a.date.localeCompare(b.date));
  } catch {
    console.warn('events.json no encontrado, usando datos de muestra');
    events = FALLBACK_EVENTS;
  }

  allEvents = events;
  renderEvents(events);
  updateStats(events);
}

// ─── INIT ─────────────────────────────────────────────────────────────────
document.getElementById('footer-date').textContent =
  new Date().toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });

loadEvents();
</script>
