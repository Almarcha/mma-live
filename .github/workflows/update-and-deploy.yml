name: 🥊 Update UFC Events & Deploy

on:
  schedule:
    - cron: '0 8,20 * * *'   # 8:00 AM y 8:00 PM UTC

  workflow_dispatch:

  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 🔥 IMPORTANTE para evitar errores de rebase

      # 2. Setup Python
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Install dependencies
      - name: 📦 Install dependencies
        run: pip install requests beautifulsoup4 lxml

      # 4. Run scraper
      - name: 🔄 Run UFC scraper
        run: python scripts/scraper.py

      # 5. Commit changes safely
      - name: 💾 Commit updated events.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "MMA Live Bot"

          git add public/events.json

          # 🔥 Solo commit si hay cambios
          git diff --staged --quiet && echo "No changes" && exit 0 || git commit -m "🥊 Auto-update UFC events [$(date '+%Y-%m-%d %H:%M')]"

          # 🔥 CLAVE: evitar error "fetch first"
          git pull --rebase origin main

          git push origin main

      # 6. Deploy GitHub Pages
      - name: 🚀 Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          branch: gh-pages
          clean: true
          force: true
